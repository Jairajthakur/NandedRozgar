name: Build Production AAB (Play Store)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Android versionCode (increment each release, e.g. 1, 2, 3...)'
        required: false
        default: ''
      version_name:
        description: 'App version name shown to users (e.g. 4.6.0)'
        required: false
        default: ''
      force_update:
        description: 'Force users to update? (true/false)'
        required: false
        default: 'false'
      update_message:
        description: 'Custom update message shown to users'
        required: false
        default: ''

jobs:
  build-aab:
    name: Build Production AAB
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$EXPO_TOKEN" ]           && MISSING="$MISSING EXPO_TOKEN"
          [ -z "$EXPO_PROJECT_ID" ]      && MISSING="$MISSING EXPO_PROJECT_ID"
          [ -z "$GOOGLE_SERVICES_JSON" ] && MISSING="$MISSING GOOGLE_SERVICES_JSON"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present."
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            && echo "✅ google-services.json is valid JSON." \
            || { echo "❌ GOOGLE_SERVICES_JSON secret is not valid JSON."; exit 1; }
          echo "GOOGLE_SERVICES_JSON_PATH=$(pwd)/google-services.json" >> $GITHUB_ENV

      - name: Build production AAB
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --output ./CityPlus-release.aab \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          NODE_ENV: production
          ANDROID_VERSION_CODE: ${{ inputs.version_code || secrets.ANDROID_VERSION_CODE || github.run_number }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}
          GOOGLE_SERVICES_JSON_PATH: ${{ env.GOOGLE_SERVICES_JSON_PATH }}

      - name: Verify AAB was produced
        run: |
          if [ ! -f ./CityPlus-release.aab ]; then
            echo "❌ CityPlus-release.aab not found — build may have silently failed."
            exit 1
          fi
          SIZE=$(du -sh ./CityPlus-release.aab | cut -f1)
          echo "✅ CityPlus-release.aab produced — size: $SIZE"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityPlus-AAB-${{ github.run_number }}
          path: ./CityPlus-release.aab
          retention-days: 30

      - name: Update Railway version env vars
        # Automatically updates ANDROID_VERSION_CODE on Railway so the
        # backend /api/app/version endpoint returns the new version and
        # users get prompted to update — no manual Railway config needed.
        if: ${{ secrets.RAILWAY_API_TOKEN != '' && secrets.RAILWAY_SERVICE_ID != '' }}
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT: production
          NEW_VERSION_CODE: ${{ inputs.version_code || secrets.ANDROID_VERSION_CODE || github.run_number }}
          NEW_VERSION_NAME: ${{ inputs.version_name || '1.0.0' }}
          FORCE_UPDATE: ${{ inputs.force_update || 'false' }}
          UPDATE_MESSAGE: ${{ inputs.update_message || '' }}
        run: |
          echo "📦 Updating Railway env: ANDROID_VERSION_CODE=$NEW_VERSION_CODE"

          # Build variables JSON
          VARS="{"ANDROID_VERSION_CODE": "$NEW_VERSION_CODE", "ANDROID_VERSION_NAME": "$NEW_VERSION_NAME", "FORCE_UPDATE": "$FORCE_UPDATE""
          if [ -n "$UPDATE_MESSAGE" ]; then
            VARS="$VARS, "UPDATE_MESSAGE": "$UPDATE_MESSAGE""
          fi
          VARS="$VARS}"

          # Call Railway API to upsert env vars
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              "query": "mutation UpsertVariables(\$input: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: \$input) }",
              "variables": {
                "input": {
                  "projectId": null,
                  "serviceId": "$RAILWAY_SERVICE_ID",
                  "environmentId": "$RAILWAY_ENVIRONMENT",
                  "variables": $VARS
                }
              }
            }")

          if echo "$RESPONSE" | grep -q '"variableCollectionUpsert":true'; then
            echo "✅ Railway env vars updated successfully."
            echo "   ANDROID_VERSION_CODE = $NEW_VERSION_CODE"
            echo "   ANDROID_VERSION_NAME = $NEW_VERSION_NAME"
            echo "   FORCE_UPDATE         = $FORCE_UPDATE"
          else
            echo "⚠️  Railway update response: $RESPONSE"
            echo "   Update may have failed — check RAILWAY_API_TOKEN and RAILWAY_SERVICE_ID secrets."
            echo "   App will still build correctly. Update Railway manually if needed."
          fi
