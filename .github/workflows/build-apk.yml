name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$EXPO_TOKEN" ]      && MISSING="$MISSING EXPO_TOKEN"
          [ -z "$EXPO_PROJECT_ID" ] && MISSING="$MISSING EXPO_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present."
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            && echo "✅ google-services.json is valid JSON." \
            || { echo "❌ GOOGLE_SERVICES_JSON secret is not valid JSON."; exit 1; }

      - name: Build APK
        run: |
          # Background watcher: copies google-services.json directly into the
          # EAS build extraction directory as soon as it appears.
          # This is simpler and safer than modifying the tarball.
          (
            echo "🔍 Watcher: waiting for EAS build directory..."
            for i in $(seq 1 180); do
              BUILD_DIR=$(ls -d /tmp/runner/eas-build-local-nodejs/*/build 2>/dev/null | head -1)
              if [ -n "$BUILD_DIR" ]; then
                echo "📁 Watcher: found build dir at $BUILD_DIR"
                cp "$GITHUB_WORKSPACE/google-services.json" "$BUILD_DIR/google-services.json"
                echo "✅ Watcher: copied google-services.json to $BUILD_DIR"
                # Keep watching in case the dir is recreated
                LAST_DIR="$BUILD_DIR"
                for j in $(seq 1 60); do
                  sleep 2
                  BUILD_DIR=$(ls -d /tmp/runner/eas-build-local-nodejs/*/build 2>/dev/null | head -1)
                  if [ -n "$BUILD_DIR" ] && [ "$BUILD_DIR" != "$LAST_DIR" ]; then
                    cp "$GITHUB_WORKSPACE/google-services.json" "$BUILD_DIR/google-services.json"
                    echo "✅ Watcher: copied google-services.json to new dir $BUILD_DIR"
                    LAST_DIR="$BUILD_DIR"
                  fi
                done
                break
              fi
              sleep 1
            done
            echo "👋 Watcher: done."
          ) &
          WATCHER_PID=$!

          eas build --platform android --profile preview --local \
            --output ./CityPlus.apk --non-interactive
          BUILD_EXIT=$?

          kill $WATCHER_PID 2>/dev/null || true
          wait $WATCHER_PID 2>/dev/null || true
          exit $BUILD_EXIT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          NODE_ENV: production
          ANDROID_VERSION_CODE: '1'
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityPlus-APK
          path: ./CityPlus.apk
          retention-days: 30
