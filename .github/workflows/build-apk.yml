name: Build Android APK + Web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Build & export Expo web ──────────────────────────────────────────
  build-web:
    name: Build & Deploy Web (via Railway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_PLATFORM: web
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload web dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ./dist
          retention-days: 7

  # ── Job 2: Build Android APK ─────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$EXPO_TOKEN" ]      && MISSING="$MISSING EXPO_TOKEN"
          [ -z "$EXPO_PROJECT_ID" ] && MISSING="$MISSING EXPO_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present."
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS slug matches app.config.js
        run: |
          CONFIG_SLUG=$(node --input-type=module << 'EOF'
          import { pathToFileURL } from 'url';
          process.env.EXPO_PROJECT_ID = process.env.EXPO_PROJECT_ID || '';
          const { default: cfg } = await import(pathToFileURL('./app.config.js').href);
          process.stdout.write(cfg?.expo?.slug || '');
          EOF
          )
          echo "app.config.js slug: $CONFIG_SLUG"

          EAS_SLUG=$(eas project:info --id "$EXPO_PROJECT_ID" --json 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j.slug||j.name||'');}catch{}})")

          echo "EAS registered slug: $EAS_SLUG"

          if [ -z "$EAS_SLUG" ]; then
            echo "⚠️  Could not fetch EAS project info — skipping slug check."
            echo "   Make sure EXPO_TOKEN and EXPO_PROJECT_ID are correct."
          elif [ "$EAS_SLUG" != "$CONFIG_SLUG" ]; then
            echo "❌ Slug mismatch: EAS project has slug '$EAS_SLUG' but app.config.js uses '$CONFIG_SLUG'."
            echo "   Fix: run 'eas project:init' locally to re-link the project,"
            echo "   then update the EXPO_PROJECT_ID GitHub secret with the new UUID."
            exit 1
          else
            echo "✅ Slug verified: $CONFIG_SLUG"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

      # ── CRITICAL FIX ─────────────────────────────────────────────────────────
      # EAS local builds create a project tarball immediately when `eas build`
      # starts. Any files written AFTER that point are NOT included in the
      # build directory that expo prebuild runs in.
      #
      # Solution: write google-services.json NOW (before `eas build`), AND
      # patch the EAS local build to copy it into the temp build dir by using
      # a custom --pre-build hook. The simplest approach that actually works is
      # to commit a real (or placeholder) google-services.json to the repo so
      # it is always present in the tarball, then overwrite it here with the
      # real secret before `eas build` archives the project.
      #
      # The file is written here so it exists in the working directory that EAS
      # tarballs up. DO NOT move this step after `eas build`.
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          echo "✅ google-services.json written to project root."
          # Verify it is valid JSON so the build doesn't fail silently
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            && echo "✅ google-services.json is valid JSON." \
            || { echo "❌ google-services.json is NOT valid JSON — check the GOOGLE_SERVICES_JSON secret."; exit 1; }

      - name: Build APK
        run: eas build --platform android --profile preview --local --output ./CityPlus.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          NODE_ENV: production
          ANDROID_VERSION_CODE: '1'
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityPlus-APK
          path: ./CityPlus.apk
          retention-days: 30
