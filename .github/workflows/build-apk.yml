name: Build Android APK + Web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # ── Job 1: Build & export Expo web ─────────────────────────────────────────
  build-web:
    name: Build & Deploy Web (via Railway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_PLATFORM: web
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload web dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ./dist
          retention-days: 7

  # ── Job 2: Build Android APK ────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ] || [ -z "${{ secrets.EXPO_PROJECT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  EXPO_TOKEN or EXPO_PROJECT_ID secret is missing — skipping APK build."
            echo "   Go to: Settings → Secrets and variables → Actions → New repository secret"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Secrets found. Proceeding with APK build."
          fi

      - name: Setup Node.js
        if: steps.check_secrets.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        if: steps.check_secrets.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip == 'false'
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        if: steps.check_secrets.outputs.skip == 'false'
        run: npm install -g eas-cli@latest

      - name: Write google-services.json
        if: steps.check_secrets.outputs.skip == 'false'
        run: |
          if [ -n '${{ secrets.GOOGLE_SERVICES_JSON }}' ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
            echo "✅ google-services.json written from secret."
          else
            echo "⚠️  GOOGLE_SERVICES_JSON secret not set — using repo file."
          fi

      - name: Verify EAS project ID matches secret
        if: steps.check_secrets.outputs.skip == 'false'
        run: |
          CONFIG_ID=$(node -e "
            const c = require('./app.config.js');
            const cfg = c.default || c;
            console.log(cfg.expo?.extra?.eas?.projectId || '');
          " --input-type module 2>/dev/null || node -e "
            process.env.EXPO_PROJECT_ID = '${{ secrets.EXPO_PROJECT_ID }}';
            const c = require('./app.config.js');
            const cfg = c.default || c;
            console.log(cfg.expo?.extra?.eas?.projectId || '');
          ")
          SECRET_ID="${{ secrets.EXPO_PROJECT_ID }}"
          if [ -z "$CONFIG_ID" ] || [ "$CONFIG_ID" = "" ]; then
            echo "⚠️  projectId in app.config.js is empty (reads from env at build time — OK)."
          elif [ "$CONFIG_ID" != "$SECRET_ID" ]; then
            echo "❌ app.config.js projectId ($CONFIG_ID) does not match EXPO_PROJECT_ID secret."
            echo "   Run: eas project:init — then update the EXPO_PROJECT_ID secret."
            exit 1
          else
            echo "✅ EAS project ID verified: $CONFIG_ID"
          fi
        env:
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

      - name: Build APK
        if: steps.check_secrets.outputs.skip == 'false'
        run: eas build --platform android --profile preview --local --output ./CityPlus.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          NODE_ENV: production
          ANDROID_VERSION_CODE: ${{ secrets.ANDROID_VERSION_CODE || '1' }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload APK artifact
        if: steps.check_secrets.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: CityPlus-APK
          path: ./CityPlus.apk
          retention-days: 30

      - name: APK build skipped notice
        if: steps.check_secrets.outputs.skip == 'true'
        run: |
          echo "::warning::APK build was skipped because EXPO_TOKEN or EXPO_PROJECT_ID secrets are not set."
          echo "Add them at: Settings → Secrets and variables → Actions"
