name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$EXPO_TOKEN" ]      && MISSING="$MISSING EXPO_TOKEN"
          [ -z "$EXPO_PROJECT_ID" ] && MISSING="$MISSING EXPO_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present."
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # Write real google-services.json into the working directory.
      # This file is also committed to the repo as a placeholder so EAS
      # includes it in the project tarball — the workflow then overwrites
      # the copy in the tarball using the inject step below.
      - name: Write google-services.json to working directory
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            && echo "✅ google-services.json is valid JSON." \
            || { echo "❌ GOOGLE_SERVICES_JSON secret is not valid JSON."; exit 1; }

      # EAS local build tarballs the project into /tmp/runner/eas-cli-nodejs/*.tar.gz
      # BEFORE running prebuild. We watch for that tarball to appear, then inject
      # our real google-services.json into it so prebuild finds it.
      - name: Build APK (with google-services.json injection)
        run: |
          # Start a background watcher that injects google-services.json
          # into the EAS project tarball as soon as EAS creates it.
          (
            echo "🔍 Watcher: waiting for EAS project tarball..."
            for i in $(seq 1 120); do
              TAR=$(ls /tmp/runner/eas-cli-nodejs/*.tar.gz 2>/dev/null | head -1)
              if [ -n "$TAR" ]; then
                echo "📦 Watcher: found tarball at $TAR"
                # Give EAS a moment to finish writing the tar
                sleep 1
                # Inject google-services.json into the tarball
                tar --append --file="$TAR" \
                  --transform='s|.*|google-services.json|' \
                  google-services.json 2>/dev/null \
                  && echo "✅ Watcher: injected google-services.json into tarball" \
                  || echo "⚠️  Watcher: tar --append failed, trying repack..."

                # Fallback: if --append didn't work, repack the tarball
                if ! tar --append --file="$TAR" --transform='s|.*|google-services.json|' google-services.json 2>/dev/null; then
                  TMPDIR=$(mktemp -d)
                  tar -xzf "$TAR" -C "$TMPDIR"
                  cp google-services.json "$TMPDIR/google-services.json"
                  tar -czf "$TAR" -C "$TMPDIR" .
                  rm -rf "$TMPDIR"
                  echo "✅ Watcher: repacked tarball with google-services.json"
                fi

                # Also watch for the extracted build dir and copy there too
                for j in $(seq 1 60); do
                  BUILD_DIR=$(ls -d /tmp/runner/eas-build-local-nodejs/*/build 2>/dev/null | head -1)
                  if [ -n "$BUILD_DIR" ]; then
                    cp google-services.json "$BUILD_DIR/google-services.json"
                    echo "✅ Watcher: copied google-services.json to $BUILD_DIR"
                    break
                  fi
                  sleep 2
                done
                break
              fi
              sleep 1
            done
            echo "👋 Watcher: done."
          ) &
          WATCHER_PID=$!

          # Run the actual EAS build
          eas build --platform android --profile preview --local \
            --output ./CityPlus.apk --non-interactive
          BUILD_EXIT=$?

          # Clean up watcher
          kill $WATCHER_PID 2>/dev/null || true
          wait $WATCHER_PID 2>/dev/null || true

          exit $BUILD_EXIT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          NODE_ENV: production
          ANDROID_VERSION_CODE: '1'
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityPlus-APK
          path: ./CityPlus.apk
          retention-days: 30
