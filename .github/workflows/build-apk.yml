name: Build Android APK + Web
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-web:
    name: Build & Deploy Web (via Railway)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Upload web dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ./dist
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set."
            exit 1
          fi
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          echo "google-services.json created successfully."

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Inject EAS Project ID into app.json
        run: |
          jq --arg id "${{ secrets.EXPO_PROJECT_ID }}" \
            '.expo.extra.eas.projectId = $id' \
            app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Build APK
        run: eas build --platform android --profile preview --local --output ./NandedRozgar.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NandedRozgar-APK
          path: ./NandedRozgar.apk
          retention-days: 30
