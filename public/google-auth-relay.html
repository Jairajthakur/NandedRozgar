<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#555">
  Signing you in… please wait.
</p>
<script>
  (function () {
    // Parse the URL hash — Google returns token here after implicit flow:
    //   /google-auth-relay.html#access_token=TOKEN&token_type=Bearer&...
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function (part) {
      var eq = part.indexOf('=');
      if (eq > 0) {
        params[decodeURIComponent(part.slice(0, eq))] =
          decodeURIComponent(part.slice(eq + 1));
      }
    });

    var accessToken = params['access_token'] || null;
    var error = params['error'] || (!accessToken ? 'no_token' : null);

    var payload = JSON.stringify({
      type: 'GOOGLE_AUTH_RESULT',
      accessToken: accessToken,
      error: error
    });

    // Store in sessionStorage as fallback — the opener polls this
    // in case postMessage races with popup being blocked/redirected.
    try { sessionStorage.setItem('__google_auth_result', payload); } catch (_) {}

    // Try postMessage to opener (standard popup flow)
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage(
          { type: 'GOOGLE_AUTH_RESULT', accessToken: accessToken, error: error },
          window.location.origin
        );
      } catch (_) {}
      // Small delay so postMessage is delivered before close
      setTimeout(function () { window.close(); }, 300);
    } else {
      // Popup was blocked and opened as a new tab — redirect back to login
      // with result encoded in the URL hash so the main page can read it.
      var base = window.location.origin + '/login';
      if (accessToken) {
        window.location.replace(base + '#google_token=' + encodeURIComponent(accessToken));
      } else {
        window.location.replace(base + '#google_error=' + encodeURIComponent(error || 'no_token'));
      }
    }
  })();
</script>
</body>
</html>
