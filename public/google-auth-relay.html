<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#555">
  Signing you in… please wait.
</p>
<script>
  (function () {
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function (part) {
      var eq = part.indexOf('=');
      if (eq > 0) {
        params[decodeURIComponent(part.slice(0, eq))] =
          decodeURIComponent(part.slice(eq + 1));
      }
    });

    var accessToken = params['access_token'] || null;
    var error = params['error'] || (!accessToken ? 'no_token' : null);

    // Write to sessionStorage as fallback (main tab polls this)
    try {
      sessionStorage.setItem('__google_auth_result', JSON.stringify({
        type: 'GOOGLE_AUTH_RESULT',
        accessToken: accessToken,
        error: error
      }));
    } catch (_) {}

    if (window.opener && !window.opener.closed) {
      // Send token to main tab
      try {
        window.opener.postMessage(
          { type: 'GOOGLE_AUTH_RESULT', accessToken: accessToken, error: error },
          window.location.origin
        );
      } catch (_) {}
      // Close this popup after a short delay
      setTimeout(function () { window.close(); }, 300);
    } else {
      // Popup became a new tab — sessionStorage polling in main tab will pick it up
      // Just show a message and let the poll handle it
      document.querySelector('p').textContent =
        'Signed in! You can close this tab and return to CityPlus.';
    }
  })();
</script>
</body>
</html>
