<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#555">
  Signing you in… please wait.
</p>
<script>
  (function () {
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function (part) {
      var eq = part.indexOf('=');
      if (eq > 0) {
        params[decodeURIComponent(part.slice(0, eq))] =
          decodeURIComponent(part.slice(eq + 1));
      }
    });

    var accessToken = params['access_token'] || null;
    var error = params['error'] || (!accessToken ? 'no_token' : null);

    // localStorage IS shared across tabs — main tab listens for 'storage' event
    try {
      localStorage.setItem('__google_auth_result', JSON.stringify({
        type: 'GOOGLE_AUTH_RESULT',
        accessToken: accessToken,
        error: error,
        ts: Date.now()
      }));
    } catch (_) {}

    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage(
          { type: 'GOOGLE_AUTH_RESULT', accessToken: accessToken, error: error },
          window.location.origin
        );
      } catch (_) {}
      setTimeout(function () { window.close(); }, 300);
    } else {
      // Opened as new tab — localStorage event will notify main tab automatically
      document.querySelector('p').textContent =
        'Signed in! Returning to CityPlus…';
      setTimeout(function () { window.close(); }, 2000);
    }
  })();
</script>
</body>
</html>
