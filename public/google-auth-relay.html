<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in — CityPlus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fbf9f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a18;
      margin-bottom: 8px;
    }
    h1 span { color: #f97316; }
    p {
      font-size: 15px;
      color: #888780;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3ede6;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: #f97316;
      font-weight: 600;
    }
    .success-icon {
      width: 48px;
      height: 48px;
      background: #dcfce7;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
      color: #16a34a;
    }
  </style>
</head>

    <h1>City<span>Plus</span></h1>
    <p>Signing you in with Google…</p>
    <div class="spinner" id="spinner"></div>
    <div class="success-icon" id="successIcon">✓</div>
    <div class="status" id="status">Please wait</div>
  </div>

  <script>
    (function () {
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function (part) {
        var eq = part.indexOf('=');
        if (eq > 0) {
          params[decodeURIComponent(part.slice(0, eq))] =
            decodeURIComponent(part.slice(eq + 1));
        }
      });

      var accessToken = params['access_token'] || null;
      var error = params['error'] || (!accessToken ? 'no_token' : null);

      try {
        localStorage.setItem('__google_auth_result', JSON.stringify({
          type: 'GOOGLE_AUTH_RESULT',
          accessToken: accessToken,
          error: error,
          ts: Date.now()
        }));
      } catch (_) {}

      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage(
            { type: 'GOOGLE_AUTH_RESULT', accessToken: accessToken, error: error },
            window.location.origin
          );
        } catch (_) {}
        document.getElementById('status').textContent = 'Done! Closing…';
        setTimeout(function () { window.close(); }, 300);
      } else {
        document.getElementById('spinner').style.display = 'none';
        var icon = document.getElementById('successIcon');
        icon.style.display = 'flex';
        document.getElementById('status').textContent = 'Signed in! Returning to CityPlus…';
        setTimeout(function () { window.close(); }, 2000);
      }
    })();
  </script>
