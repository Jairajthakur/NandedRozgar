<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#555">
  Signing you in… please wait.
</p>
<script>
  (function () {
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function (part) {
      var eq = part.indexOf('=');
      if (eq > 0) {
        params[decodeURIComponent(part.slice(0, eq))] =
          decodeURIComponent(part.slice(eq + 1));
      }
    });

    var accessToken = params['access_token'] || null;
    var error = params['error'] || (!accessToken ? 'no_token' : null);

    // Always store in sessionStorage — main tab polls for this
    try {
      sessionStorage.setItem('__google_auth_result', JSON.stringify({
        type: 'GOOGLE_AUTH_RESULT',
        accessToken: accessToken,
        error: error
      }));
    } catch (_) {}

    if (window.opener && !window.opener.closed) {
      // Standard popup: post message to main tab then close this popup
      try {
        window.opener.postMessage(
          { type: 'GOOGLE_AUTH_RESULT', accessToken: accessToken, error: error },
          window.location.origin
        );
      } catch (_) {}
      setTimeout(function () { window.close(); }, 200);
    } else {
      // Popup was blocked — opened as new tab, redirect back to /login with token in hash
      var base = window.location.origin + '/login';
      if (accessToken) {
        window.location.replace(base + '#google_token=' + encodeURIComponent(accessToken));
      } else {
        window.location.replace(base + '#google_error=' + encodeURIComponent(error || 'no_token'));
      }
    }
  })();
</script>
</body>
</html>
