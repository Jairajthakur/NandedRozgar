<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Complete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fff8f5; padding: 24px;
    }
    .box   { text-align: center; max-width: 340px; }
    .icon  { font-size: 72px; margin-bottom: 20px; }
    h2     { color: #111; font-size: 22px; margin-bottom: 8px; }
    p      { color: #666; font-size: 15px; line-height: 1.5; }
    .badge {
      display: inline-block; margin-top: 16px;
      background: #fff; border: 1px solid #fed7aa;
      color: #f97316; font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
    }
    .open-btn {
      display: inline-block; margin-top: 20px;
      background: #f97316; color: #fff;
      font-size: 15px; font-weight: 700;
      padding: 12px 28px; border-radius: 10px;
      text-decoration: none; border: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" id="icon">⏳</div>
    <h2 id="title">Processing payment…</h2>
    <p id="msg">Returning you to the app…</p>
    <span class="badge">Secured by Cashfree Payments</span>
    <br>
    <a id="open-app" class="open-btn" style="display:none">Open CityPlus App</a>
  </div>

  <script>
    var params  = new URLSearchParams(window.location.search);

    // FIX: Cashfree may send payment_status OR orderStatus OR txStatus
    // Normalise all of them to a single STATUS variable
    var status = (
      params.get('payment_status') ||
      params.get('orderStatus') ||
      params.get('txStatus') ||
      params.get('status') ||
      ''
    ).toUpperCase();

    // FIX: Cashfree may send order_id OR orderId OR cf_order_id
    var orderId = (
      params.get('order_id') ||
      params.get('orderId') ||
      params.get('cf_order_id') ||
      ''
    );

    // FIX: Cashfree sometimes sends "PAID" instead of "SUCCESS"
    if (status === 'PAID') status = 'SUCCESS';

    // Build the deep link back to the app
    var deepLink =
      'cityplus://payment/callback' +
      '?order_id='       + encodeURIComponent(orderId) +
      '&payment_status=' + encodeURIComponent(status);

    // Update visible UI based on status
    if (status === 'SUCCESS') {
      document.getElementById('icon').textContent  = '✅';
      document.getElementById('title').textContent = 'Payment Successful!';
      document.getElementById('msg').textContent   = 'Returning you to the app…';
    } else if (status === 'FAILED') {
      document.getElementById('icon').textContent  = '❌';
      document.getElementById('title').textContent = 'Payment Failed';
      document.getElementById('msg').textContent   = 'Please go back to the app and try again.';
    } else if (status === 'CANCELLED') {
      document.getElementById('icon').textContent  = '↩️';
      document.getElementById('title').textContent = 'Payment Cancelled';
      document.getElementById('msg').textContent   = 'Your payment was cancelled. Go back to the app to retry.';
    } else {
      // Unknown / empty status — still try to return to app
      // The app-side verify endpoint will check Cashfree directly
      document.getElementById('icon').textContent  = '⏳';
      document.getElementById('title').textContent = 'Payment Pending';
      document.getElementById('msg').textContent   = 'Your payment is being verified. Returning to the app…';
      // Bug 9 fix: previously sent payment_status=SUCCESS for unknown/pending status,
      // which caused the app to resolve the payment promise as successful before the
      // server confirmed the outcome — showing a false success screen. Now we send
      // PENDING so the app routes it to the unconfirmed path and /verify is the
      // source of truth when the user retries or the screen polls.
      deepLink =
        'cityplus://payment/callback' +
        '?order_id='       + encodeURIComponent(orderId) +
        '&payment_status=PENDING';
    }

    var btn = document.getElementById('open-app');
    btn.href = deepLink;

    function redirect() {
      window.location.href = deepLink;
      setTimeout(function () {
        btn.style.display = 'inline-block';
        btn.textContent   = 'Open CityPlus App';
      }, 2000);
    }

    setTimeout(redirect, 400);
  </script>
</body>
</html>
