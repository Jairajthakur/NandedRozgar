<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CityPlus Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0d;--surface:#141415;--surface2:#1c1c1e;--border:#2a2a2e;--border2:#3a3a3e;
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --orange:#f97316;--orange-dim:#7c3800;--orange-bg:rgba(249,115,22,.08);
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);
  --radius:10px;--radius-sm:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{color:inherit;text-decoration:none}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 40px;width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:36px}
.brand-name{font-size:26px;font-weight:600;letter-spacing:-.5px}
.brand-name span{color:var(--orange)}
.brand-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-top:6px}
.field{margin-bottom:18px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--orange)}
.field input::placeholder{color:var(--text3)}
.btn-primary{width:100%;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.error-msg{background:var(--red-bg);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--border)}
.sidebar-brand .brand-name{font-size:18px}
.nav-items{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);transition:all .15s;margin-bottom:2px;font-size:13px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--orange-bg);color:var(--orange)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.logout-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:220px;padding:32px;min-height:100vh}
.page-title{font-size:20px;font-weight:600;margin-bottom:24px;color:var(--text)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-val{font-size:26px;font-weight:600;color:var(--text)}
.stat-val.orange{color:var(--orange)}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-val.blue{color:var(--blue)}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:14px;font-weight:600}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:220px;transition:border-color .15s}
.search-input:focus{border-color:var(--orange)}
.search-input::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:11px 16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-active{background:var(--green-bg);color:var(--green)}
.badge-inactive{background:var(--red-bg);color:var(--red)}
.badge-admin{background:var(--orange-bg);color:var(--orange)}
.badge-pro{background:var(--blue-bg);color:var(--blue)}
.badge-paid{background:var(--green-bg);color:var(--green)}
.badge-pending{background:rgba(250,204,21,.1);color:#fbbf24}
.action-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-ban{background:var(--red-bg);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-ban:hover{background:var(--red);color:#fff}
.btn-unban{background:var(--green-bg);border-color:rgba(34,197,94,.3);color:var(--green)}
.btn-unban:hover{background:var(--green);color:#fff}
.btn-feature{background:var(--orange-bg);border-color:rgba(249,115,22,.3);color:var(--orange)}
.btn-feature:hover{background:var(--orange);color:#fff}
.btn-delete{background:var(--red-bg);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-delete:hover{background:var(--red);color:#fff}
.btn-pro{background:var(--blue-bg);border-color:rgba(96,165,250,.3);color:var(--blue)}
.btn-pro:hover{background:var(--blue);color:#fff}
.actions-cell{display:flex;gap:6px;flex-wrap:wrap}
.loading{text-align:center;padding:48px;color:var(--text3);font-family:'DM Mono',monospace;font-size:12px}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px}

/* ── NOTIFY PANEL ── */
.notify-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:560px}
.notify-form .field input,.notify-form .field textarea,.notify-form .field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.notify-form .field textarea{resize:vertical;min-height:90px}
.notify-form .field select option{background:var(--surface2)}
.notify-form .field input:focus,.notify-form .field textarea:focus,.notify-form .field select:focus{border-color:var(--orange)}
.send-result{margin-top:14px;padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;display:none}
.send-result.ok{background:var(--green-bg);border:1px solid rgba(34,197,94,.25);color:#86efac}
.send-result.err{background:var(--red-bg);border:1px solid rgba(239,68,68,.25);color:#fca5a5}

/* ── SPINNER ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-spinner{display:block;text-align:center;padding:48px;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;color:var(--text);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:100;max-width:320px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{border-color:rgba(34,197,94,.4);color:var(--green)}
#toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-name">City<span>Plus</span></div>
      <div class="brand-sub">Admin Portal</div>
    </div>
    <div class="error-msg" id="err"></div>
    <div class="field"><label>Email</label><input type="email" id="em" placeholder="admin@example.com" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">City<span style="color:var(--orange)">Plus</span></div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:5px">Admin</div>
    </div>
    <nav class="nav-items">
      <div class="nav-item active" onclick="showTab('overview')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </div>
      <div class="nav-item" onclick="showTab('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
        Users
      </div>
      <div class="nav-item" onclick="showTab('jobs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Jobs
      </div>
      <div class="nav-item" onclick="showTab('payments')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Payments
      </div>
      <div class="nav-item" onclick="showTab('vehicles')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Car Rent
      </div>
      <div class="nav-item" onclick="showTab('rooms')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home / PG
      </div>
      <div class="nav-item" onclick="showTab('buysell')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Buy &amp; Sell
      </div>
      <div class="nav-item" onclick="showTab('analytics')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Analytics
      </div>
      <div class="nav-item" onclick="showTab('logs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Activity Logs
      </div>
      <div class="nav-item" onclick="showTab('post')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Post Listing
      </div>
      <div class="nav-item" onclick="showTab('notify')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
</div>

<div id="toast"></div>

<script>
const API = '';
let TOKEN = localStorage.getItem('admin_token') || '';
let currentTab = 'overview';
let allUsers = [], allJobs = [], allPayments = [];

// ── AUTH ─────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  return r.json();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin(); });

async function doLogin() {
  const email = document.getElementById('em').value.trim();
  const pw    = document.getElementById('pw').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('err');
  err.style.display = 'none';
  if (!email || !pw) { showErr('Enter email and password.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  try {
    const d = await api('POST', '/api/auth/login', { email, password: pw });
    if (!d.ok) { showErr(d.error || 'Login failed.'); return; }
    if (d.user?.role !== 'admin') { showErr('Access denied — admins only.'); return; }
    TOKEN = d.token;
    localStorage.setItem('admin_token', TOKEN);
    bootApp();
  } catch { showErr('Network error. Try again.'); }
  finally { btn.disabled = false; btn.innerHTML = 'Sign In'; }
}
function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }

async function checkExistingSession() {
  if (!TOKEN) return false;
  try {
    const d = await api('GET', '/api/auth/me');
    if (d.ok && d.user?.role === 'admin') return true;
    try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } }); } catch {}
  TOKEN = ''; localStorage.removeItem('admin_token'); return false;
  } catch { return false; }
}

async function bootApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  showTab('overview');
}

async function logout() {
  stopLogsPolling();
  try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } }); } catch {}
  TOKEN = ''; localStorage.removeItem('admin_token');
  allUsers = []; allJobs = []; allPayments = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw').value = '';
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = ['overview','users','jobs','payments','vehicles','rooms','buysell','analytics','logs','post','notify'].indexOf(tab);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  const m = document.getElementById('main-content');
  m.innerHTML = '<div class="tab-spinner">Loading…</div>';
  if (tab === 'overview')   loadOverview();
  if (tab === 'users')      loadUsers();
  if (tab === 'jobs')       loadJobs();
  if (tab === 'vehicles')   loadVehicles();
  if (tab === 'rooms')      loadRooms();
  if (tab === 'buysell')    loadBuySell();
  if (tab === 'payments')   loadPayments();
  if (tab === 'analytics')  loadAnalytics();
  if (tab === 'logs')       { logsPage=1; logsAction=''; logsStatus=''; logsSearch=''; loadLogs(); startLogsPolling(); }
  else                       { stopLogsPolling(); }
  if (tab === 'post')       renderPostTab();
  if (tab === 'notify')     renderNotify();
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fDate(d) { return d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function fMoney(v) { return '₹' + Number(v||0).toLocaleString('en-IN'); }

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
async function loadOverview() {
  const d = await api('GET', '/api/admin/stats');
  const s = d.stats || {};
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Overview</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Active Jobs</div><div class="stat-val orange">${s.active_jobs||0}</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val">${s.total_users||0}</div></div>
      <div class="stat-card"><div class="stat-label">PRO Users</div><div class="stat-val blue">${s.pro_users||0}</div></div>
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-val green">${fMoney(s.total_revenue)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-val">${Number(s.total_views||0).toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Applications</div><div class="stat-val">${s.total_applicants||0}</div></div>
      <div class="stat-card"><div class="stat-label">Featured Jobs</div><div class="stat-val orange">${s.featured_jobs||0}</div></div>
      <div class="stat-card"><div class="stat-label">Banned Users</div><div class="stat-val red">${s.banned_users||0}</div></div>
      <div class="stat-card"><div class="stat-label">Active Vehicles</div><div class="stat-val orange">${s.active_vehicles||0}</div></div>
      <div class="stat-card"><div class="stat-label">Active Rooms</div><div class="stat-val blue">${s.active_rooms||0}</div></div>
      <div class="stat-card"><div class="stat-label">Active Listings</div><div class="stat-val">${s.active_buysell||0}</div></div>
      <div class="stat-card"><div class="stat-label">Items Sold</div><div class="stat-val green">${s.sold_buysell||0}</div></div>
    </div>

    <!-- Revenue Breakdown -->
    <div class="table-wrap" style="margin-bottom:16px">
      <div class="table-header"><h3>Revenue Breakdown</h3></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0">
        <div style="padding:16px 20px;border-right:1px solid var(--border);text-align:center">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Jobs</div>
          <div style="font-size:20px;font-weight:600;color:var(--green)">${fMoney(s.jobs_revenue||0)}</div>
        </div>
        <div style="padding:16px 20px;border-right:1px solid var(--border);text-align:center">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Car Rent</div>
          <div style="font-size:20px;font-weight:600;color:var(--orange)">${fMoney(s.vehicles_revenue||0)}</div>
        </div>
        <div style="padding:16px 20px;border-right:1px solid var(--border);text-align:center">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Home / PG</div>
          <div style="font-size:20px;font-weight:600;color:var(--blue)">${fMoney(s.rooms_revenue||0)}</div>
        </div>
        <div style="padding:16px 20px;text-align:center">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Buy &amp; Sell</div>
          <div style="font-size:20px;font-weight:600;color:var(--text)">${fMoney(s.buysell_revenue||0)}</div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="table-wrap" style="cursor:pointer" onclick="showTab('users')">

function renderNotify() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Push Notifications</div>
    <div class="notify-form">
      <div class="field"><label>Title</label><input type="text" id="ntitle" placeholder="e.g. New jobs in Nanded!"/></div>
      <div class="field"><label>Message</label><textarea id="nbody" placeholder="Write your notification message…"></textarea></div>
      <div class="field">
        <label>Target audience</label>
        <select id="ntarget">
          <option value="all">All users</option>
          <option value="pro">PRO users only</option>
          <option value="free">Free users only</option>
        </select>
      </div>
      <button class="btn-primary" id="send-btn" onclick="sendNotif()" style="width:auto;padding:11px 28px">Send Notification</button>
      <div class="send-result" id="send-result"></div>
    </div>`;
}

async function sendNotif() {
  const title  = document.getElementById('ntitle').value.trim();
  const body   = document.getElementById('nbody').value.trim();
  const target = document.getElementById('ntarget').value;
  const btn    = document.getElementById('send-btn');
  const res    = document.getElementById('send-result');
  res.style.display = 'none';
  if (!title || !body) { res.className='send-result err'; res.textContent='Title and message are required.'; res.style.display='block'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const d = await api('POST', '/api/admin/notifications', { title, body, target });
    if (d.ok) {
      res.className = 'send-result ok';
      res.textContent = `Sent to ${d.sent_to} device${d.sent_to!==1?'s':''}${d.failed?' ('+d.failed+' failed)':''}`;
    } else {
      res.className = 'send-result err';
      res.textContent = d.error || 'Failed to send.';
    }
    res.style.display = 'block';
  } catch { res.className='send-result err'; res.textContent='Network error.'; res.style.display='block'; }
  finally { btn.disabled=false; btn.innerHTML='Send Notification'; }
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
async function loadAnalytics() {
  const d = await api('GET', '/api/admin/analytics');
  if (!d.ok) { document.getElementById('main-content').innerHTML = '<div class="empty">Failed to load analytics</div>'; return; }

  const days30 = [...Array(30)].map((_,i) => {
    const dt = new Date(); dt.setDate(dt.getDate() - (29 - i));
    return dt.toISOString().slice(0,10);
  });

  function buildMap(arr, key='count') {
    const m = {};
    (arr||[]).forEach(r => { m[r.day?.slice(0,10)] = Number(r[key]||0); });
    return m;
  }

  const signupMap   = buildMap(d.signups);
  const loginMap    = buildMap(d.logins);
  const failMap     = buildMap(d.login_fails);
  const jobMap      = buildMap(d.jobs_chart);
  const payMap      = buildMap(d.payments_chart, 'total');

  function sparkline(days, map, color, label) {
    const vals = days.map(day => map[day]||0);
    const max = Math.max(...vals, 1);
    const pts = vals.map((v,i) => `${(i/(vals.length-1))*280},${40 - (v/max)*36}`).join(' ');
    const total = vals.reduce((a,b)=>a+b,0);
    return `<div class="stat-card" style="min-width:0">
      <div class="stat-label">${label} <span style="color:var(--text3);font-weight:400">(30d)</span></div>
      <div class="stat-val" style="color:${color};font-size:22px;margin-bottom:8px">${total.toLocaleString()}</div>
      <svg viewBox="0 0 280 44" style="width:100%;height:44px;overflow:visible">
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>`;
  }

  function barChart(days, maps, colors, labels, title, valuePrefix='') {
    const maxVal = Math.max(...days.flatMap(d => maps.map(m => m[d]||0)), 1);
    const bars = days.map((day, i) => {
      const shortDay = new Date(day).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
      const barGroup = maps.map((m, mi) => {
        const val = m[day]||0;
        const h = Math.max(2, Math.round((val/maxVal)*80));
        return `<div title="${labels[mi]}: ${valuePrefix}${val}" style="flex:1;background:${colors[mi]};height:${h}px;border-radius:2px 2px 0 0;min-width:2px"></div>`;
      }).join('');
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0">
        <div style="display:flex;gap:1px;align-items:flex-end;height:80px;width:100%">${barGroup}</div>
        ${i % 5 === 0 ? `<div style="font-size:9px;color:var(--text3);white-space:nowrap;transform:rotate(-45deg);transform-origin:top center;margin-top:4px">${shortDay}</div>` : ''}
      </div>`;
    }).join('');
    const legend = labels.map((l,i) => `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};display:inline-block"></span>${l}</span>`).join('');
    return `<div class="table-wrap" style="padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:14px;font-weight:600">${title}</h3>
        <div style="display:flex;gap:12px">${legend}</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:2px;height:100px;overflow:hidden">${bars}</div>
    </div>`;
  }

  const topActionsHtml = (d.top_actions||[]).map(a => {
    const colors = {login:'var(--green)',register:'var(--blue)',logout:'var(--text3)',login_failed:'var(--red)',login_blocked:'var(--orange)'};
    const col = colors[a.action] || 'var(--text2)';
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:${col};font-family:'DM Mono',monospace">${a.action}</span>
      <span style="color:var(--text);font-weight:600">${Number(a.count).toLocaleString()}</span>
    </div>`;
  }).join('') || '<div class="empty">No activity yet</div>';

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Analytics</div>
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:20px">
      ${sparkline(days30, signupMap,  'var(--blue)',   'New Signups')}
      ${sparkline(days30, loginMap,   'var(--green)',  'Logins')}
      ${sparkline(days30, failMap,    'var(--red)',    'Failed Logins')}
      ${sparkline(days30, jobMap,     'var(--orange)', 'Jobs Posted')}
      ${sparkline(days30, payMap,     'var(--green)',  'Revenue (₹)')}
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
      ${barChart(days30, [signupMap, loginMap, failMap], ['var(--blue)','var(--green)','var(--red)'], ['Signups','Logins','Failed'], 'User Activity (30 days)')}
      <div class="table-wrap" style="padding:20px">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Top Actions (30d)</h3>
        ${topActionsHtml}
      </div>
    </div>
    ${barChart(days30, [payMap], ['var(--green)'], ['Revenue ₹'], 'Revenue Last 30 Days (₹)', '₹')}
  `;
}

async function handleAdminPhotoUpload(input) {
  const files = Array.from(input.files).slice(0, 10);
  const status = document.getElementById('photo-upload-status');
  const preview = document.getElementById('photo-preview');
  if (!files.length) return;

  status.innerHTML = `<span style="color:var(--orange)">Uploading ${files.length} photo(s)…</span>`;
  window._adminPhotos = [];
  preview.innerHTML = '';

  // Compress image to under 1MB before uploading
  async function compressImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const MAX_DIM = 1200;
        let { width, height } = img;
        if (width > MAX_DIM || height > MAX_DIM) {
          if (width > height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
          else { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
      img.src = url;
    });
  }

  for (const file of files) {
    try {
      status.innerHTML = `<span style="color:var(--orange)">Uploading ${file.name}…</span>`;

      // Compress image before upload
      let base64;
      try {
        base64 = await compressImage(file);
      } catch {
        // Fallback: read as-is
        base64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }

      const d = await api('POST', '/api/upload/image', { image: base64, folder: 'cityplus/admin' });

      if (d.ok && d.url) {
        window._adminPhotos.push(d.url);
        preview.innerHTML += `
          <div style="position:relative;display:inline-block">
            <img src="${d.url}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">
            <button onclick="removeAdminPhoto('${d.url}',this.parentElement)"
              style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center">✕</button>
          </div>`;
      } else {
        const errMsg = d.error || 'Upload failed';
        status.innerHTML += ` <span style="color:var(--red)">⚠ ${file.name}: ${errMsg}</span>`;
        console.error('[photo upload]', file.name, errMsg);
      }
    } catch(e) {
      status.innerHTML += ` <span style="color:var(--red)">⚠ ${file.name}: network error</span>`;
      console.error('[photo upload error]', e);
    }
  }
  if (window._adminPhotos.length > 0) {
    status.innerHTML = `<span style="color:var(--green)">✅ ${window._adminPhotos.length} photo(s) uploaded</span>`;
  } else {
    status.innerHTML = `<span style="color:var(--red)">⚠ No photos uploaded — check Cloudinary settings or try smaller images</span>`;
  }
}

function removeAdminPhoto(url, el) {
  window._adminPhotos = (window._adminPhotos || []).filter(u => u !== url);
  el.remove();
  const status = document.getElementById('photo-upload-status');
  if (status) status.innerHTML = `<span style="color:var(--green)">${window._adminPhotos.length} photo(s) uploaded</span>`;
}

async function submitAdminPost() {
  const form = document.getElementById('admin-post-form');
  const result = document.getElementById('post-result');
  if (!form) return;

  const data = {};
  new FormData(form).forEach((v, k) => { data[k] = v; });
  // Attach uploaded photo URLs (always send the array, even if empty)
  data.photos = Array.isArray(window._adminPhotos) ? window._adminPhotos : [];

  // Basic required check
  const required = form.querySelectorAll('[required]');
  for (const el of required) {
    if (!el.value.trim()) {
      result.innerHTML = `<span style="color:var(--red)">⚠ Please fill in: ${el.placeholder.replace(' *','')}</span>`;
      el.focus(); return;
    }
  }

  result.innerHTML = `<span style="color:var(--text3)">Posting…</span>`;

  const endpointMap = { job: 'job', room: 'room', vehicle: 'vehicle', buysell: 'buysell' };
  try {
    const d = await api('POST', '/api/admin/post/' + endpointMap[postService], data);

    if (d.ok) {
      result.innerHTML = `<span style="color:var(--green)">✅ Posted successfully! (No payment required)</span>`;
      form.reset();
      window._adminPhotos = [];
      document.getElementById('photo-preview') && (document.getElementById('photo-preview').innerHTML = '');
      const ps = document.getElementById('photo-upload-status');
      if (ps) ps.innerHTML = 'No photos selected';
    } else {
      result.innerHTML = `<span style="color:var(--red)">❌ ${d.error || 'Failed to post'}</span>`;
    }
  } catch(e) {
    result.innerHTML = `<span style="color:var(--red)">❌ Network error. Please try again.</span>`;
    console.error('[submitAdminPost]', e);
  }
}

    buysell_item_listed:'var(--blue)', buysell_item_deleted:'var(--red)',
    // Profile
    profile_updated:'var(--blue)', resume_uploaded:'var(--blue)', resume_deleted:'var(--red)',
    image_uploaded:'var(--blue)', image_deleted:'var(--red)',
    // Views & Browse
    job_viewed:'var(--text2)', jobs_browsed:'var(--text3)', applications_viewed:'var(--text2)', saved_jobs_viewed:'var(--text2)',
    room_viewed:'var(--text2)', rooms_browsed:'var(--text3)',
    vehicle_viewed:'var(--text2)', vehicles_browsed:'var(--text3)',
    buysell_item_viewed:'var(--text2)', buysell_browsed:'var(--text3)',
    chat_opened:'var(--text3)', profile_viewed:'var(--text3)', alerts_viewed:'var(--text3)', analytics_viewed:'var(--text3)',
    app_open:'var(--blue)',
    // Social
    message_sent:'var(--text2)', rating_submitted:'var(--blue)',
    job_alert_created:'var(--blue)', job_alert_toggled:'var(--text2)', job_alert_deleted:'var(--red)',
    promotion_created:'var(--blue)', coupon_validated:'var(--text2)', coupon_used:'var(--green)',
    // Admin
    admin_user_toggled:'var(--orange)', admin_pro_granted:'var(--green)', admin_pro_revoked:'var(--red)',
    admin_role_changed:'var(--orange)', admin_job_status_changed:'var(--orange)',
    admin_job_featured:'var(--blue)', admin_job_deleted:'var(--red)',
    admin_buysell_deleted:'var(--red)', admin_vehicle_status_changed:'var(--orange)',
    admin_vehicle_deleted:'var(--red)', admin_room_status_changed:'var(--orange)',
    admin_room_deleted:'var(--red)', admin_notification_sent:'var(--blue)',
    admin_test:'var(--text3)',
  };
  const statusColors = { success:'badge-active', failed:'badge-inactive', blocked:'badge-inactive' };

  const rows = logs.map(l => `
    <tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">#${l.id}</td>
      <td style="color:${actionColors[l.action]||'var(--text2)'};font-family:'DM Mono',monospace;font-size:12px">${esc(l.action)}</td>
      <td style="font-weight:500">${esc(l.user_name||'—')}</td>
      <td style="color:var(--text2);font-size:12px">${esc(l.user_email||'—')}</td>
      <td><span class="badge ${statusColors[l.status]||'badge-inactive'}">${l.status}</span></td>
      <td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">${esc(l.ip||'—')}</td>
      <td style="color:var(--text2);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.detail||'—')}</td>
      <td style="color:var(--text3);font-size:12px;white-space:nowrap">${fDate(l.created_at)} ${new Date(l.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</td>
    </tr>`).join('') || '<tr><td colspan="8" class="empty">No logs found</td></tr>';

  const pagination = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border)">
      <span style="font-size:12px;color:var(--text3)">Showing ${((page-1)*50)+1}–${Math.min(page*50,total)} of ${total}</span>
      <div style="display:flex;gap:6px">
        ${page > 1 ? `<button class="action-btn btn-pro" onclick="loadLogs(${page-1})">← Prev</button>` : ''}
        <span style="padding:5px 10px;font-size:12px;color:var(--text2)">Page ${page} / ${totalPages}</span>
        ${page < totalPages ? `<button class="action-btn btn-pro" onclick="loadLogs(${page+1})">Next →</button>` : ''}
      </div>
    </div>` : '';

  if (silent && document.getElementById('logs-tbody')) {
    document.getElementById('logs-tbody').innerHTML = rows;
    const counter = document.getElementById('logs-counter');
    if (counter) counter.textContent = '(' + total + ')';
    const liveIndicator = document.getElementById('logs-live-dot');
    if (liveIndicator) { liveIndicator.style.opacity='1'; setTimeout(()=>{ liveIndicator.style.opacity='0.3'; }, 600); }
    return;
  }
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Activity Logs</div>
    <div class="table-wrap">
      <div class="table-header" style="flex-wrap:wrap;gap:8px">
        <h3>All logs <span id="logs-counter" style="color:var(--text3);font-weight:400;font-size:12px">(${total})</span> <span id="logs-live-dot" title="Live" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;opacity:0.3;transition:opacity 0.4s;vertical-align:middle;margin-left:4px"></span></h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="search-input" style="width:180px" placeholder="Search user, IP, detail…" value="${esc(logsSearch)}" oninput="logsSearch=this.value" onkeydown="if(event.key==='Enter')loadLogs(1)"/>
          <select class="search-input" style="width:160px" onchange="logsAction=this.value;loadLogs(1)">
            <option value="">All actions</option>
            <optgroup label="── Auth ──">
              <option value="login" ${logsAction==='login'?'selected':''}>Login (Email)</option>
              <option value="login_google" ${logsAction==='login_google'?'selected':''}>Login (Google)</option>
              <option value="login_otp" ${logsAction==='login_otp'?'selected':''}>Login (OTP)</option>
              <option value="login_failed" ${logsAction==='login_failed'?'selected':''}>Login Failed</option>
              <option value="login_blocked" ${logsAction==='login_blocked'?'selected':''}>Login Blocked</option>
              <option value="register" ${logsAction==='register'?'selected':''}>Register</option>
              <option value="logout" ${logsAction==='logout'?'selected':''}>Logout</option>
              <option value="app_open" ${logsAction==='app_open'?'selected':''}>App Open</option>
            </optgroup>
            <optgroup label="── Views ──">
              <option value="job_viewed" ${logsAction==='job_viewed'?'selected':''}>Job Viewed</option>
              <option value="jobs_browsed" ${logsAction==='jobs_browsed'?'selected':''}>Jobs Browsed</option>
              <option value="applications_viewed" ${logsAction==='applications_viewed'?'selected':''}>Applications Viewed</option>
              <option value="saved_jobs_viewed" ${logsAction==='saved_jobs_viewed'?'selected':''}>Saved Jobs Viewed</option>
              <option value="room_viewed" ${logsAction==='room_viewed'?'selected':''}>Room Viewed</option>
              <option value="rooms_browsed" ${logsAction==='rooms_browsed'?'selected':''}>Rooms Browsed</option>
              <option value="vehicle_viewed" ${logsAction==='vehicle_viewed'?'selected':''}>Vehicle Viewed</option>
              <option value="vehicles_browsed" ${logsAction==='vehicles_browsed'?'selected':''}>Vehicles Browsed</option>
              <option value="buysell_item_viewed" ${logsAction==='buysell_item_viewed'?'selected':''}>Buy&Sell Item Viewed</option>
              <option value="buysell_browsed" ${logsAction==='buysell_browsed'?'selected':''}>Buy&Sell Browsed</option>
              <option value="chat_opened" ${logsAction==='chat_opened'?'selected':''}>Chat Opened</option>
              <option value="profile_viewed" ${logsAction==='profile_viewed'?'selected':''}>Profile Viewed</option>
              <option value="password_changed" ${logsAction==='password_changed'?'selected':''}>Password Changed</option>
              <option value="account_deleted" ${logsAction==='account_deleted'?'selected':''}>Account Deleted</option>
            </optgroup>
            <optgroup label="── Jobs ──">
              <option value="job_created" ${logsAction==='job_created'?'selected':''}>Job Created</option>
              <option value="job_applied" ${logsAction==='job_applied'?'selected':''}>Job Applied</option>
              <option value="job_saved" ${logsAction==='job_saved'?'selected':''}>Job Saved</option>
              <option value="job_deleted" ${logsAction==='job_deleted'?'selected':''}>Job Deleted</option>
              <option value="job_reported" ${logsAction==='job_reported'?'selected':''}>Job Reported</option>
            </optgroup>
            <optgroup label="── Payments ──">
              <option value="payment_initiated" ${logsAction==='payment_initiated'?'selected':''}>Payment Initiated</option>
              <option value="payment_verified" ${logsAction==='payment_verified'?'selected':''}>Payment Verified</option>
            </optgroup>
            <optgroup label="── Listings ──">
              <option value="vehicle_listed" ${logsAction==='vehicle_listed'?'selected':''}>Vehicle Listed</option>
              <option value="room_listed" ${logsAction==='room_listed'?'selected':''}>Room Listed</option>
              <option value="buysell_item_listed" ${logsAction==='buysell_item_listed'?'selected':''}>Buy&Sell Listed</option>
            </optgroup>
            <optgroup label="── Profile ──">
              <option value="profile_updated" ${logsAction==='profile_updated'?'selected':''}>Profile Updated</option>
              <option value="resume_uploaded" ${logsAction==='resume_uploaded'?'selected':''}>Resume Uploaded</option>
              <option value="message_sent" ${logsAction==='message_sent'?'selected':''}>Message Sent</option>
            </optgroup>
            <optgroup label="── Admin ──">
              <option value="admin_user_toggled" ${logsAction==='admin_user_toggled'?'selected':''}>Admin: User Toggled</option>
              <option value="admin_pro_granted" ${logsAction==='admin_pro_granted'?'selected':''}>Admin: PRO Granted</option>
              <option value="admin_job_deleted" ${logsAction==='admin_job_deleted'?'selected':''}>Admin: Job Deleted</option>
              <option value="admin_notification_sent" ${logsAction==='admin_notification_sent'?'selected':''}>Admin: Notification Sent</option>
            </optgroup>
          </select>
          <select class="search-input" style="width:120px" onchange="logsStatus=this.value;loadLogs(1)">
            <option value="">All status</option>
            <option value="success" ${logsStatus==='success'?'selected':''}>Success</option>
            <option value="failed" ${logsStatus==='failed'?'selected':''}>Failed</option>
            <option value="blocked" ${logsStatus==='blocked'?'selected':''}>Blocked</option>
          </select>
          <button class="action-btn btn-pro" onclick="loadLogs(1)">Filter</button>
          <button class="action-btn" style="background:rgba(107,114,128,0.15);color:var(--text2)" onclick="logsAction='';logsStatus='';logsSearch='';loadLogs(1)">✕ Clear</button>
          <button class="action-btn" style="background:rgba(239,68,68,0.1);color:var(--red)" onclick="deleteTestLogs()">🗑 Delete Test Logs</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>ID</th><th>Action</th><th>User</th><th>Email</th><th>Status</th><th>IP</th><th>Detail</th><th>Time</th></tr></thead>
          <tbody id="logs-tbody">${rows}</tbody>
        </table>
      </div>
      ${pagination}
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  if (await checkExistingSession()) bootApp();
})();
</script>
</body>
</html>
